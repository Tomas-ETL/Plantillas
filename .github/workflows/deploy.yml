name: Deploy to GitHub Pages

on:
  push:
    branches:
      - Johny # Solo se activa cuando subes cambios a tu rama

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            Inventario/package-lock.json
            servicio-inventario/package-lock.json

      # --- DESPLIEGUE DE NEXT.JS (WEB) ---
      - name: Install Next.js Dependencies
        run: |
          cd servicio-inventario
          npm install

      - name: Build Next.js
        run: |
          cd servicio-inventario
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      # --- DESPLIEGUE DE IONIC (MÓVIL) ---
      - name: Install Ionic Dependencies
        run: |
          cd Inventario
          npm install

      - name: Build Ionic
        run: |
          cd Inventario
          # Inyectar las claves en el archivo de producción antes de compilar
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}|g" src/environments/environment.prod.ts
          sed -i "s|SUPABASE_KEY_PLACEHOLDER|${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}|g" src/environments/environment.prod.ts
          # Compilamos con base-href para que funcione en subcarpeta
          npx ng build --configuration production --base-href /Plantillas/inventario-movil/

      # --- ORGANIZACIÓN DE ARCHIVOS PARA EL DESPLIEGUE ---
      - name: Prepare Deployment Folder
        run: |
          mkdir -p deployment
          # Copiamos Next.js a la raíz o subcarpeta
          cp -r servicio-inventario/out deployment/inventario-web
          # Copiamos Ionic a su subcarpeta (usando la ruta correcta 'www')
          cp -r Inventario/www deployment/inventario-movil
          # Creamos un index.html simple en la raíz para redirigir o elegir
          echo '<!DOCTYPE html><html><body style="font-family:sans-serif; text-align:center; padding: 50px;"><h1>Panel de Inventario</h1><p><a href="./inventario-web">Ir a Versión Web (Next.js)</a></p><p><a href="./inventario-movil">Ir a Versión Móvil (Ionic)</a></p></body></html>' > deployment/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deployment
          branch: gh-pages # Sube los archivos compilados a esta rama especial
